<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Nadha · Print Dashboard</title>
    <!-- html2pdf library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <style>
        /* ── Reset & Base ─────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fc;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-wrapper {
            max-width: 1400px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 15px 40px rgba(11, 43, 74, 0.06);
            padding: 1.8rem 2rem 2.5rem;
        }

        /* ── Header ────────────────────────────────────────────────── */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 1.2rem;
        }

        .app-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #0b2b4a;
            text-transform: uppercase;
        }

        .app-header .sub {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* ── Navbar Tabs ──────────────────────────────────────────── */
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 0.4rem;
        }

        .nav-tab {
            background: transparent;
            border: none;
            padding: 0.7rem 1.6rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #64748b;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .nav-tab:hover {
            background: #f1f5f9;
            color: #0b2b4a;
        }

        .nav-tab.active {
            background: #0b2b4a;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(11, 43, 74, 0.2);
        }

        /* ── Tab Content ──────────────────────────────────────────── */
        .tab-content {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0.4;
                transform: translateY(4px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Info Banner ──────────────────────────────────────────── */
        .info-banner {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 0.7rem 1.2rem;
            border-radius: 12px;
            color: #166534;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
        }

        /* ── Stats Row ────────────────────────────────────────────── */
        .stats-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }

        .stat-item {
            background: #f1f5f9;
            padding: 0.35rem 1.2rem;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #475569;
        }

        .stat-item strong {
            color: #0b2b4a;
        }

        /* ── Filter Panel ──────────────────────────────────────────── */
        .filter-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            background: #f8fafd;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.2rem;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .filter-group label {
            font-weight: 600;
            color: #0b2b4a;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .filter-select {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 0.4rem 1.2rem 0.4rem 0.8rem;
            font-weight: 500;
            font-size: 0.9rem;
            background: #ffffff;
            color: #0b2b4a;
            outline: none;
            cursor: pointer;
            min-width: 110px;
        }

        .filter-select:focus {
            border-color: #0b2b4a;
        }

        .filter-input {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 0.4rem 0.8rem;
            font-weight: 500;
            font-size: 0.9rem;
            background: #ffffff;
            color: #0b2b4a;
            outline: none;
            min-width: 140px;
        }

        .filter-input:focus {
            border-color: #0b2b4a;
        }

        .filter-btn {
            background: #0b2b4a;
            border: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.45rem 1.6rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .filter-btn:hover {
            background: #1e3b5a;
        }

        .reset-btn {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #475569;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.45rem 1.6rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: #f8fafc;
            color: #0b2b4a;
        }

        .count-badge {
            background: #e0f2fe;
            padding: 0.3rem 1.2rem;
            border-radius: 20px;
            font-weight: 600;
            color: #0369a1;
            font-size: 0.8rem;
        }

        /* ── Table ────────────────────────────────────────────────── */
        .table-responsive {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
            font-size: 0.92rem;
        }

        th {
            background: #f8fafc;
            color: #0b2b4a;
            font-weight: 700;
            padding: 0.9rem 1rem;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            cursor: pointer;
            user-select: none;
        }
        th:hover {
            background: #eef2f6;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        tr:hover td {
            background-color: #fafcff;
        }

        .empty-message {
            text-align: center;
            padding: 2.5rem;
            color: #94a3b8;
            font-style: italic;
        }

        /* ── Badge: Dept / Source ─────────────────────────────────── */
        .badge-dept {
            background: #f0f4f8;
            padding: 0.2rem 0.7rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #0b2b4a;
            display: inline-block;
        }

        /* ── Status Badge ──────────────────────────────────── */
        .badge-status {
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: capitalize;
            display: inline-block;
        }
        .badge-status.pending {
            background: #fef9c3;
            color: #854d0e;
        }
        .badge-status.completed {
            background: #dcfce7;
            color: #166534;
        }
        .badge-status.cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        /* ── Mode / Type Color Badges ────────────────────────────── */
        .badge-mode {
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: capitalize;
            display: inline-block;
            border: 1px solid transparent;
        }
        .badge-mode.to-get {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
        }
        .badge-mode.to-give {
            background: #fee2e2;
            color: #991b1b;
            border-color: #fca5a5;
        }
        .badge-mode.hard {
            background: #ffedd5;
            color: #9a3412;
            border-color: #fdba74;
        }
        .badge-mode.soft {
            background: #dbeafe;
            color: #1e40af;
            border-color: #93c5fd;
        }
        .badge-mode.default {
            background: #f1f5f9;
            color: #475569;
            border-color: #cbd5e1;
        }

        /* ── Link "view" ──────────────────────────────────────────── */
        .view-link {
            color: #0b2b4a;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .view-link:hover {
            color: #1e3b5a;
        }

        /* ── Print Button ─────────────────────────────────────────── */
        .print-section {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.5rem;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .print-btn {
            background: #0b2b4a;
            border: none;
            color: #ffffff;
            font-weight: 700;
            padding: 0.8rem 2.2rem;
            border-radius: 14px;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(11, 43, 74, 0.12);
            transition: all 0.2s;
        }

        .print-btn:hover {
            background: #153e66;
            transform: translateY(-1px);
        }

        /* ── PDF render zone ────────────────────────────────────────── */
        #pdf-render-zone {
            display: block !important;
            visibility: visible !important;
            position: relative !important;
            background: #ffffff !important;
            margin: 0 auto;
        }

        body.printing-mode .app-wrapper {
            display: none !important;
        }
        body:not(.printing-mode) #pdf-render-zone {
            display: none !important;
        }

        /* ── Responsive ───────────────────────────────────────────── */
        @media (max-width: 700px) {
            .app-wrapper {
                padding: 1.2rem;
            }
            .app-header h1 {
                font-size: 1.3rem;
            }
            .nav-tab {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
            .filter-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: stretch;
            }
            .filter-select, .filter-input {
                flex: 1;
                min-width: 80px;
            }
            .filter-btn,
            .reset-btn {
                flex: 1;
                justify-content: center;
            }
            .print-section {
                justify-content: center;
            }
            .print-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper" id="appWrapper">

        <!-- ─── HEADER ──────────────────────────────────────────── -->
        <div class="app-header">
            <div>
                <h1>Nadha · Print</h1>
                <span class="sub">Union &amp; Transactions dashboard</span>
            </div>
            <div style="font-size:0.85rem; color:#64748b;">
                <span id="currentDate"></span>
            </div>
        </div>

        <!-- ─── NAVBAR ──────────────────────────────────────────── -->
        <div class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-tab="tab-union">🏛️ Union</button>
            <button class="nav-tab" data-tab="tab-transactions">📊 Transactions</button>
        </div>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- TAB 1 — UNION                                              -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <div class="tab-content active" id="tab-union">

            <!-- Filter Panel -->
            <div class="filter-panel" id="unionFilterPanel">
                <div class="filter-group">
                    <label>📌 Type</label>
                    <select class="filter-select" id="unionTypeFilter">
                        <option value="all">All</option>
                        <option value="to get">To Get</option>
                        <option value="to give">To Give</option>
                        <option value="hard">Hard</option>
                        <option value="soft">Soft</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📌 Status</label>
                    <select class="filter-select" id="unionStatusFilter">
                        <option value="all">All</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🔤 Title</label>
                    <input class="filter-input" id="unionTitleFilter" placeholder="Filter title..." />
                </div>
                <div class="filter-group" style="gap:0.5rem;">
                    <button class="filter-btn" id="unionApplyFilterBtn">Apply</button>
                    <button class="reset-btn" id="unionResetFilterBtn">Reset</button>
                    <span class="count-badge" id="unionCountBadge">All</span>
                </div>
            </div>

            <div class="stats-row">
                <span class="stat-item">Total: <strong id="unionTotalCount">0</strong></span>
                <span class="stat-item" style="background:#e6f0fa;">Filtered: <strong id="unionFilteredCount">0</strong></span>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Transaction ID</th>
                            <th data-sort="title" class="sortable">Title ⇅</th>
                            <th data-sort="type" class="sortable">Type ⇅</th>
                            <th data-sort="status" class="sortable">Status ⇅</th>
                            <th>Bill URL</th>
                            <th data-sort="amount" class="sortable">Amount ⇅</th>
                            <th data-sort="date" class="sortable">Date ⇅</th>
                            <th data-sort="updated_at" class="sortable">Updated At ⇅</th>
                        </tr>
                    </thead>
                    <tbody id="unionBody">
                        <tr><td colspan="9" class="empty-message">Loading union…</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Print button for Union -->
            <div class="print-section">
                <button class="print-btn" id="unionPrintBtn">
                    <span>📄</span> Download Union PDF
                </button>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- TAB 2 — TRANSACTIONS (all user sheets)                    -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <div class="tab-content" id="tab-transactions">

            <!-- Filter Panel -->
            <div class="filter-panel" id="txFilterPanel">
                <div class="filter-group">
                    <label>📌 Mode</label>
                    <select class="filter-select" id="txModeFilter">
                        <option value="all">All</option>
                        <option value="to get">To Get</option>
                        <option value="to give">To Give</option>
                        <option value="hard">Hard</option>
                        <option value="soft">Soft</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📌 Status</label>
                    <select class="filter-select" id="txStatusFilter">
                        <option value="all">All</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🔤 Title</label>
                    <input class="filter-input" id="txTitleFilter" placeholder="Filter title..." />
                </div>
                <div class="filter-group">
                    <label>👤 Source</label>
                    <input class="filter-input" id="txSourceFilter" placeholder="Filter source..." />
                </div>
                <div class="filter-group" style="gap:0.5rem;">
                    <button class="filter-btn" id="txApplyFilterBtn">Apply</button>
                    <button class="reset-btn" id="txResetFilterBtn">Reset</button>
                    <span class="count-badge" id="txCountBadge">All</span>
                </div>
            </div>

            <div class="stats-row">
                <span class="stat-item">Total: <strong id="txTotalCount">0</strong></span>
                <span class="stat-item" style="background:#e6f0fa;">Filtered: <strong id="txFilteredCount">0</strong></span>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Transaction ID</th>
                            <th>Title</th>
                            <th>Mode</th>
                            <th>Status</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Updated At</th>
                            <th>Bill URL</th>
                            <th>Source</th>
                        </tr>
                    </thead>
                    <tbody id="txBody">
                        <tr><td colspan="10" class="empty-message">Loading transactions…</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Print button for transactions -->
            <div class="print-section">
                <button class="print-btn" id="txPrintBtn">
                    <span>📄</span> Download Transactions PDF
                </button>
            </div>
        </div>

    </div>
    <!-- end app-wrapper -->

    <!-- ─── PDF RENDER ZONE ────────────────────────────────────────── -->
    <div id="pdf-render-zone"></div>

    <script>

            // ─── HELPERS ──────────────────────────────────────────────────────────────

            function escapeHTML(str) {
                if (str === undefined || str === null) return '';
                return String(str).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' } [m] ||
                    m));
            }

            function parseCSV(csvText) {
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length === 0) return [];

                const cleanSplit = (row) => {
                    const res = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < row.length; i++) {
                        const ch = row[i];
                        if (ch === '"') { inQuotes = !inQuotes; } else if (ch === ',' && !inQuotes) {
                            res.push(current.trim());
                            current = '';
                        } else {
                            current += ch;
                        }
                    }
                    res.push(current.trim());
                    return res;
                };

                const headers = cleanSplit(lines[0]).map(h => h.toLowerCase().trim());
                const rows = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = cleanSplit(lines[i]);
                    const obj = {};
                    headers.forEach((h, idx) => {
                        obj[h] = (idx < cols.length) ? cols[idx] : '';
                    });
                    rows.push(obj);
                }
                return rows;
            }

            function fetchSheet(url) {
                return fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.text();
                    })
                    .then(csv => parseCSV(csv));
            }

            function getModeClass(val) {
                if (!val) return 'default';
                const v = String(val).toLowerCase().trim();
                if (v === 'to get' || v === 'toget') return 'to-get';
                if (v === 'to give' || v === 'togive') return 'to-give';
                if (v === 'hard') return 'hard';
                if (v === 'soft') return 'soft';
                return 'default';
            }

            function getStatusBadge(status) {
                if (!status) return `<span class="badge-status">—</span>`;
                const s = String(status).toLowerCase().trim();
                let cls = 'badge-status';
                if (s === 'pending') cls += ' pending';
                else if (s === 'completed') cls += ' completed';
                else if (s === 'cancelled') cls += ' cancelled';
                return `<span class="${cls}">${escapeHTML(s)}</span>`;
            }

            function renderBillLink(url) {
                if (!url || url.trim() === '') return '—';
                const clean = url.trim();
                return `<a href="${escapeHTML(clean)}" target="_blank" class="view-link">view</a>`;
            }

            // ─── SORT: UNION ──────────────────────────────────────────────────────────

            function sortUnionData(data, key, asc) {
                if (!key) return data;
                const sorted = [...data];
                sorted.sort((a, b) => {
                    const va = (a[key] || '').toString().toLowerCase();
                    const vb = (b[key] || '').toString().toLowerCase();
                    if (va < vb) return asc ? -1 : 1;
                    if (va > vb) return asc ? 1 : -1;
                    return 0;
                });
                return sorted;
            }

            // ─── RENDER: UNION ──────────────────────────────────────────────────────

            function renderUnion(data) {
                if (!data || data.length === 0) {
                    unionBody.innerHTML = `<tr><td colspan="9" class="empty-message">No union records found.</td></tr>`;
                    unionTotalCount.textContent = '0';
                    unionFilteredCount.textContent = '0';
                    unionCountBadge.textContent = '0';
                    return;
                }

                let html = '';
                data.forEach((row, i) => {
                    const typeVal = row.type || '';
                    const modeCls = getModeClass(typeVal);
                    const statusHtml = getStatusBadge(row.status);
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td><code>${escapeHTML(row.transaction_id)}</code></td>
                        <td><strong>${escapeHTML(row.title)}</strong></td>
                        <td><span class="badge-mode ${modeCls}">${escapeHTML(typeVal)}</span></td>
                        <td>${statusHtml}</td>
                        <td>${renderBillLink(row.bill_url)}</td>
                        <td>${escapeHTML(row.amount)}</td>
                        <td>${escapeHTML(row.date)}</td>
                        <td>${escapeHTML(row.updated_at)}</td>
                    </tr>`;
                });

                unionBody.innerHTML = html;
                unionTotalCount.textContent = unionData.length;
                unionFilteredCount.textContent = data.length;
                const total = unionData.length;
                unionCountBadge.textContent = data.length === total ?
                    `All ${data.length}` :
                    `${data.length} / ${total}`;
            }

            // ─── RENDER: TRANSACTIONS (with title from lookup) ────────────────────

            function renderTransactions(data) {
                if (!data || data.length === 0) {
                    txBody.innerHTML = `<tr><td colspan="10" class="empty-message">No transactions found.</td></tr>`;
                    txTotalCount.textContent = '0';
                    txFilteredCount.textContent = '0';
                    txCountBadge.textContent = '0';
                    return;
                }

                let html = '';
                data.forEach((row, i) => {
                    const modeVal = row.mode || '';
                    const modeCls = getModeClass(modeVal);
                    const statusHtml = getStatusBadge(row.status);
                    // lookup title from titleLookup map using transaction_id
                    const title = titleLookup[row.transaction_id] || row.title || '—';

                    html += `<tr>
                        <td>${i + 1}</td>
                        <td><code>${escapeHTML(row.transaction_id)}</code></td>
                        <td><strong>${escapeHTML(title)}</strong></td>
                        <td><span class="badge-mode ${modeCls}">${escapeHTML(modeVal)}</span></td>
                        <td>${statusHtml}</td>
                        <td>${escapeHTML(row.amount)}</td>
                        <td>${escapeHTML(row.date)}</td>
                        <td>${escapeHTML(row.updated_at)}</td>
                        <td>${renderBillLink(row.bill_url)}</td>
                        <td><span class="badge-dept">${escapeHTML(row.source)}</span></td>
                    </tr>`;
                });

                txBody.innerHTML = html;
                txTotalCount.textContent = allTransactions.length;
                txFilteredCount.textContent = data.length;
                const total = allTransactions.length;
                txCountBadge.textContent = data.length === total ?
                    `All ${data.length}` :
                    `${data.length} / ${total}`;
            }

            // ─── FILTER: UNION ──────────────────────────────────────────────────────

            function applyUnionFilters() {
                const typeVal = unionTypeFilter.value.toLowerCase().trim();
                const statusVal = unionStatusFilter.value.toLowerCase().trim();
                const titleVal = unionTitleFilter.value.toLowerCase().trim();

                let filtered = unionData.filter(row => {
                    const rowType = String(row.type || '').toLowerCase().trim();
                    const rowStatus = String(row.status || '').toLowerCase().trim();
                    const rowTitle = String(row.title || '').toLowerCase().trim();
                    let match = true;
                    if (typeVal !== 'all' && rowType !== typeVal) match = false;
                    if (statusVal !== 'all' && rowStatus !== statusVal) match = false;
                    if (titleVal && !rowTitle.includes(titleVal)) match = false;
                    return match;
                });

                if (unionSortKey) {
                    filtered = sortUnionData(filtered, unionSortKey, unionSortAsc);
                }

                filteredUnion = filtered;
                renderUnion(filtered);
            }

            // ─── FILTER: TRANSACTIONS ──────────────────────────────────────────────

            function applyTransactionFilters() {
                const modeVal = txModeFilter.value.toLowerCase().trim();
                const statusVal = txStatusFilter.value.toLowerCase().trim();
                const titleVal = txTitleFilter.value.toLowerCase().trim();
                const sourceVal = txSourceFilter.value.toLowerCase().trim();

                let filtered = allTransactions.filter(row => {
                    const rowMode = String(row.mode || '').toLowerCase().trim();
                    const rowStatus = String(row.status || '').toLowerCase().trim();
                    const rowSource = String(row.source || '').toLowerCase().trim();
                    // lookup title for filtering
                    const rowTitle = (titleLookup[row.transaction_id] || row.title || '').toLowerCase().trim();
                    let match = true;
                    if (modeVal !== 'all' && rowMode !== modeVal) match = false;
                    if (statusVal !== 'all' && rowStatus !== statusVal) match = false;
                    if (titleVal && !rowTitle.includes(titleVal)) match = false;
                    if (sourceVal && !rowSource.includes(sourceVal)) match = false;
                    return match;
                });

                filteredTransactions = filtered;
                renderTransactions(filtered);
            }

            // ─── LOAD DATA ──────────────────────────────────────────────────────────

            function loadAllData() {
                // First load title lookup sheet
                fetchSheet(TITLE_LOOKUP_URL)
                    .then(rows => {
                        const map = {};
                        rows.forEach(row => {
                            if (row.transaction_id) {
                                map[row.transaction_id.trim()] = row.title || '';
                            }
                        });
                        titleLookup = map;
                        console.log(`Loaded ${Object.keys(titleLookup).length} titles from lookup.`);
                    })
                    .catch(err => console.warn('Title lookup load error:', err))
                    .finally(() => {
                        // Then load union and transactions regardless
                        loadUnionAndTransactions();
                    });
            }

            function loadUnionAndTransactions() {
                // 1. Union
                fetchSheet(UNION_SHEET.url)
                    .then(data => {
                        unionData = data;
                        filteredUnion = [...data];
                        if (unionSortKey) {
                            filteredUnion = sortUnionData(filteredUnion, unionSortKey, unionSortAsc);
                        }
                        renderUnion(filteredUnion);
                    })
                    .catch(err => {
                        console.error('Union load error:', err);
                        unionBody.innerHTML =
                            `<tr><td colspan="9" class="empty-message">⚠️ Failed to load union sheet.</td></tr>`;
                    });

                // 2. All user transaction sheets
                const sheetKeys = Object.keys(USER_TRANSACTION_SHEETS);
                const fetchPromises = sheetKeys.map(source => {
                    const url = USER_TRANSACTION_SHEETS[source];
                    return fetchSheet(url)
                        .then(rows => {
                            rows.forEach(r => r.source = source);
                            return rows;
                        })
                        .catch(err => {
                            console.warn(`Failed to load ${source}:`, err);
                            return [];
                        });
                });

                Promise.all(fetchPromises)
                    .then(results => {
                        const combined = [];
                        results.forEach(rows => {
                            combined.push(...rows);
                        });
                        allTransactions = combined;
                        filteredTransactions = [...combined];
                        renderTransactions(combined);

                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.date)}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.updated_at)}</td>
                            </tr>`;
                    });

                    const pageBreak = (page < totalPages - 1) ? 'page-break-after: always !important;' : '';
                    pagesHTML += `
                        <div style="padding:35px 40px; width:210mm; background:#ffffff; color:#000000; font-family:Arial,sans-serif; box-sizing:border-box; ${pageBreak}">
                            <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:12px; margin-bottom:20px;">
                                <h1 style="font-size:22px; font-weight:bold; margin:0; letter-spacing:2px; color:#000;">UNION · TYPE & STATUS</h1>
                                <p style="font-size:13px; margin:6px 0 0; font-weight:bold; color:#000;">${dateStr}</p>
                            </div>
                            <table style="width:100%; border-collapse:collapse; border:1px solid #cbd5e1;">
                                <thead>
                                    <tr style="background-color:#FAF6EE !important; border-bottom:2px solid #000;">
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:6%;">#</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:14%;">Tx ID</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:18%;">Title</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:12%;">Type</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:12%;">Status</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:12%;">Amount</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:12%;">Date</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:14%;">Updated</th>
                                    </tr>
                                </thead>
                                <tbody>${rowsHTML}</tbody>
                            </table>
                            <div style="margin-top:20px; border-top:1px solid #000; padding-top:8px; display:flex; justify-content:space-between; font-size:10px; font-weight:bold; color:#475569;">
                                <div>Total: ${total} · Page ${page+1} of ${totalPages}</div>
                                <div>Nadha · Union</div>
                            </div>
                        </div>
                    `;
                }

                const zone = document.getElementById('pdf-render-zone');
                zone.innerHTML = pagesHTML;
                document.body.classList.add('printing-mode');

                const opt = {
                    margin: 0,
                    filename: `Union_Status_${dateStr}.pdf`,
                    image: { type: 'jpeg', quality: 1.0 },
                    html2canvas: { scale: 2.5, logging: false, useCORS: true, scrollX: 0, scrollY: 0 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['css', 'legacy'] }
                };

                html2pdf().set(opt).from(zone).save()
                    .then(() => {
                        document.body.classList.remove('printing-mode');
                        zone.innerHTML = '';
                    })
                    .catch(err => {
                        console.error(err);
                        document.body.classList.remove('printing-mode');
                        zone.innerHTML = '';
                        alert('PDF generation failed.');
                    });
            }

            unionPrintBtn.addEventListener('click', generateUnionPDF);

            // ─── PRINT: TRANSACTIONS PDF (no bill_url, with title) ───────────────

            function generateTransactionsPDF() {
                const data = filteredTransactions;
                if (!data || data.length === 0) {
                    alert('No transaction data to print.');
                    return;
                }

                const today = new Date();
                const dateStr =
                    `${String(today.getDate()).padStart(2, '0')}-${String(today.getMonth() + 1).padStart(2, '0')}-${today.getFullYear()}`;
                const PER_PAGE = 25;
                const total = data.length;
                const totalPages = Math.ceil(total / PER_PAGE);

                let pagesHTML = '';
                for (let page = 0; page < totalPages; page++) {
                    const start = page * PER_PAGE;
                    const end = Math.min(start + PER_PAGE, total);
                    const pageData = data.slice(start, end);

                    let rowsHTML = '';
                    pageData.forEach((row, idx) => {
                        const globalIdx = start + idx + 1;
                        const title = titleLookup[row.transaction_id] || row.title || '—';
                        rowsHTML += `
                            <tr style="border-bottom:1px solid #d1d5db;">
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${globalIdx}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.transaction_id)}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(title)}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.mode)}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.status)}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.amount)}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.date)}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.updated_at)}</td>
                                <td style="padding:8px 10px; font-size:11.5px; text-align:left; color:#000;">${escapeHTML(row.source)}</td>
                            </tr>`;
                    });

                    const pageBreak = (page < totalPages - 1) ? 'page-break-after: always !important;' : '';
                    pagesHTML += `
                        <div style="padding:35px 40px; width:210mm; background:#ffffff; color:#000000; font-family:Arial,sans-serif; box-sizing:border-box; ${pageBreak}">
                            <div style="text-align:center; border-bottom:2px solid #000; padding-bottom:12px; margin-bottom:20px;">
                                <h1 style="font-size:22px; font-weight:bold; margin:0; letter-spacing:2px; color:#000;">TRANSACTIONS STATUS</h1>
                                <p style="font-size:13px; margin:6px 0 0; font-weight:bold; color:#000;">${dateStr}</p>
                            </div>
                            <table style="width:100%; border-collapse:collapse; border:1px solid #cbd5e1;">
                                <thead>
                                    <tr style="background-color:#FAF6EE !important; border-bottom:2px solid #000;">
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:6%;">#</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:12%;">Tx ID</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:15%;">Title</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:10%;">Mode</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:12%;">Status</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:10%;">Amount</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:10%;">Date</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:12%;">Updated</th>
                                        <th style="padding:8px 10px; text-align:left; font-weight:bold; font-size:11px; color:#000; width:13%;">Source</th>
                                    </tr>
                                </thead>
                                <tbody>${rowsHTML}</tbody>
                            </table>
                            <div style="margin-top:20px; border-top:1px solid #000; padding-top:8px; display:flex; justify-content:space-between; font-size:10px; font-weight:bold; color:#475569;">
                                <div>Total: ${total} · Page ${page+1} of ${totalPages}</div>
                                <div>Nadha · Transactions</div>
                            </div>
                        </div>
                    `;
                }

                const zone = document.getElementById('pdf-render-zone');
                zone.innerHTML = pagesHTML;
                document.body.classList.add('printing-mode');

                const opt = {
                    margin: 0,
                    filename: `Transactions_Status_${dateStr}.pdf`,
                    image: { type: 'jpeg', quality: 1.0 },
                    html2canvas: { scale: 2.5, logging: false, useCORS: true, scrollX: 0, scrollY: 0 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['css', 'legacy'] }
                };

                html2pdf().set(opt).from(zone).save()
                    .then(() => {
                        document.body.classList.remove('printing-mode');
                        zone.innerHTML = '';
                    })
                    .catch(err => {
                        console.error(err);
                        document.body.classList.remove('printing-mode');
                        zone.innerHTML = '';
                        alert('PDF generation failed.');
                    });
            }

            txPrintBtn.addEventListener('click', generateTransactionsPDF);

            // ─── BOOT ──────────────────────────────────────────────────────────────────

            setCurrentDate();
            loadAllData();

        })();
    </script>
