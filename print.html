<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Nadha · Print Dashboard</title>
    <!-- html2pdf library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
    </script>
    <style>
        /* ── Reset & Base ─────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fc;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-wrapper {
            max-width: 1300px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 15px 40px rgba(11, 43, 74, 0.06);
            padding: 1.8rem 2rem 2.5rem;
        }

        /* ── Header ────────────────────────────────────────────────── */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 1.2rem;
        }

        .app-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #0b2b4a;
            text-transform: uppercase;
        }

        .app-header .sub {
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* ── Navbar Tabs ──────────────────────────────────────────── */
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 0.4rem;
        }

        .nav-tab {
            background: transparent;
            border: none;
            padding: 0.7rem 1.6rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #64748b;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .nav-tab:hover {
            background: #f1f5f9;
            color: #0b2b4a;
        }

        .nav-tab.active {
            background: #0b2b4a;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(11, 43, 74, 0.2);
        }

        /* ── Tab Content ──────────────────────────────────────────── */
        .tab-content {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0.4;
                transform: translateY(4px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Info Banner ──────────────────────────────────────────── */
        .info-banner {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 0.7rem 1.2rem;
            border-radius: 12px;
            color: #166534;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
        }

        /* ── Stats Row ────────────────────────────────────────────── */
        .stats-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }

        .stat-item {
            background: #f1f5f9;
            padding: 0.35rem 1.2rem;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #475569;
        }

        .stat-item strong {
            color: #0b2b4a;
        }

        /* ── Filter Panel ─────────────────────────────────────────── */
        .filter-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            background: #f8fafd;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.2rem;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .filter-group label {
            font-weight: 600;
            color: #0b2b4a;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .filter-select {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 0.4rem 1.2rem 0.4rem 0.8rem;
            font-weight: 500;
            font-size: 0.9rem;
            background: #ffffff;
            color: #0b2b4a;
            outline: none;
            cursor: pointer;
            min-width: 110px;
        }

        .filter-select:focus {
            border-color: #0b2b4a;
        }

        .filter-btn {
            background: #0b2b4a;
            border: none;
            color: #ffffff;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.45rem 1.6rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .filter-btn:hover {
            background: #1e3b5a;
        }

        .reset-btn {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #475569;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.45rem 1.6rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: #f8fafc;
            color: #0b2b4a;
        }

        .count-badge {
            background: #e0f2fe;
            padding: 0.3rem 1.2rem;
            border-radius: 20px;
            font-weight: 600;
            color: #0369a1;
            font-size: 0.8rem;
        }

        /* ── Table ────────────────────────────────────────────────── */
        .table-responsive {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
            font-size: 0.92rem;
        }

        th {
            background: #f8fafc;
            color: #0b2b4a;
            font-weight: 700;
            padding: 0.9rem 1rem;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        tr:hover td {
            background-color: #fafcff;
        }

        .empty-message {
            text-align: center;
            padding: 2.5rem;
            color: #94a3b8;
            font-style: italic;
        }

        .badge-dept {
            background: #f0f4f8;
            padding: 0.2rem 0.7rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #0b2b4a;
            display: inline-block;
        }

        /* ── Type badges with colors ─────────────────────────────── */
        .badge-type {
            padding: 0.2rem 0.9rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: capitalize;
            display: inline-block;
            color: #fff;
        }
        .badge-type.hard { background: #f97316; }      /* orange */
        .badge-type.soft { background: #3b82f6; }      /* blue */
        .badge-type.toget { background: #22c55e; }     /* green */
        .badge-type.togive { background: #ef4444; }    /* red */

        .badge-mode {
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: capitalize;
            display: inline-block;
            background: #e6f0fa;
            color: #0b2b4a;
        }

        /* ── Print Button ─────────────────────────────────────────── */
        .print-section {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .print-btn {
            background: #0b2b4a;
            border: none;
            color: #ffffff;
            font-weight: 700;
            padding: 0.8rem 2.2rem;
            border-radius: 14px;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(11, 43, 74, 0.12);
            transition: all 0.2s;
        }

        .print-btn:hover {
            background: #153e66;
            transform: translateY(-1px);
        }

        /* ── PDF render zone (hidden) ────────────────────────────── */
        #pdf-render-zone {
            display: block !important;
            visibility: visible !important;
            position: relative !important;
            background: #ffffff !important;
            margin: 0 auto;
        }

        body.printing-mode .app-wrapper {
            display: none !important;
        }
        body:not(.printing-mode) #pdf-render-zone {
            display: none !important;
        }

        /* ── Responsive ───────────────────────────────────────────── */
        @media (max-width: 700px) {
            .app-wrapper {
                padding: 1.2rem;
            }
            .app-header h1 {
                font-size: 1.3rem;
            }
            .nav-tab {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
            .filter-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: stretch;
            }
            .filter-select {
                flex: 1;
            }
            .filter-btn,
            .reset-btn {
                flex: 1;
                justify-content: center;
            }
            .print-section {
                justify-content: center;
            }
            .print-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper" id="appWrapper">

        <!-- ─── HEADER ──────────────────────────────────────────── -->
        <div class="app-header">
            <div>
                <h1>Nadha · Print</h1>
                <span class="sub">Union &amp; Transactions</span>
            </div>
            <div style="font-size:0.85rem; color:#64748b;">
                <span id="currentDate"></span>
            </div>
        </div>

        <!-- ─── NAVBAR ──────────────────────────────────────────── -->
        <div class="nav-tabs" id="navTabs">
            <button class="nav-tab active" data-tab="tab-union">🏛️ Union</button>
            <button class="nav-tab" data-tab="tab-transactions">📊 Transactions</button>
        </div>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- TAB 1 — union (filter by type)                           -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <div class="tab-content active" id="tab-union">

            <!-- Filter Panel for Union -->
            <div class="filter-panel" id="unionFilterPanel">
                <div class="filter-group">
                    <label>📌 Type</label>
                    <select class="filter-select" id="unionTypeFilter">
                        <option value="all">All</option>
                        <option value="hard">Hard</option>
                        <option value="soft">Soft</option>
                        <option value="to get">To Get</option>
                        <option value="to give">To Give</option>
                    </select>
                </div>
                <div class="filter-group" style="gap:0.5rem;">
                    <button class="filter-btn" id="unionApplyFilterBtn">Apply</button>
                    <button class="reset-btn" id="unionResetFilterBtn">Reset</button>
                    <span class="count-badge" id="unionCountBadge">All</span>
                </div>
            </div>

            <div class="stats-row">
                <span class="stat-item">Total: <strong id="unionTotalCount">0</strong></span>
                <span class="stat-item" style="background:#e6f0fa;">Filtered: <strong id="unionFilteredCount">0</strong></span>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Transaction ID</th>
                            <th>Title</th>
                            <th>Type</th>
                            <th>Bill URL</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Updated At</th>
                        </tr>
                    </thead>
                    <tbody id="unionBody">
                        <tr><td colspan="8" class="empty-message">Loading union…</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Print button for union -->
            <div class="print-section">
                <button class="print-btn" id="unionPrintBtn">
                    <span>📄</span> Download Union PDF
                </button>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- TAB 2 — transactions (all user sheets)                   -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <div class="tab-content" id="tab-transactions">

            <div class="stats-row">
                <span class="stat-item">Total: <strong id="txTotalCount">0</strong></span>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Transaction ID</th>
                            <th>Mode</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Updated At</th>
                            <th>User</th>
                        </tr>
                    </thead>
                    <tbody id="txBody">
                        <tr><td colspan="7" class="empty-message">Loading transactions…</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Print button for transactions -->
            <div class="print-section">
                <button class="print-btn" id="txPrintBtn">
                    <span>📄</span> Download Transactions PDF
                </button>
            </div>
        </div>

    </div>
    <!-- end app-wrapper -->

    <!-- ─── PDF RENDER ZONE ────────────────────────────────────────── -->
    <div id="pdf-render-zone"></div>

                    { name: 'muhsin', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTq1rqjiEtufgddsU2Wq6UNoX7Nfm6RosBl91wzy4gdoAQ9HpjPF7zr7Ld92OJyHMKk3F1vQnPqP3m1/pub?gid=1973975096&single=true&output=csv' }

            // ─── STATE ──────────────────────────────────────────────────────────────
            const dataStore = {
                union: [],
                transactions: []
            };

            let filteredUnion = [];

            // ─── DOM REFS ────────────────────────────────────────────────────────────
            const tabContents = document.querySelectorAll('.tab-content');
            const navTabs = document.querySelectorAll('.nav-tab');

            const unionBody = document.getElementById('unionBody');
            const txBody = document.getElementById('txBody');

            const unionTotalCount = document.getElementById('unionTotalCount');
            const unionFilteredCount = document.getElementById('unionFilteredCount');
            const unionCountBadge = document.getElementById('unionCountBadge');
            const txTotalCount = document.getElementById('txTotalCount');

            const unionTypeFilter = document.getElementById('unionTypeFilter');
            const unionApplyFilterBtn = document.getElementById('unionApplyFilterBtn');
            const unionResetFilterBtn = document.getElementById('unionResetFilterBtn');
            const unionPrintBtn = document.getElementById('unionPrintBtn');
            const txPrintBtn = document.getElementById('txPrintBtn');

            const currentDateEl = document.getElementById('currentDate');

            // ─── HELPERS ──────────────────────────────────────────────────────────────
            function escapeHTML(str) {
                if (str === undefined || str === null) return '';
                return String(str).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' } [m] ||
                    m));
            }

            function parseCSV(csvText) {
                const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length === 0) return [];

                const cleanSplit = (row) => {
                    const res = [];
                    let current = '';
                    let inQuotes = false;
                    for (let i = 0; i < row.length; i++) {
                        const ch = row[i];
                        if (ch === '"') { inQuotes = !inQuotes; } else if (ch === ',' && !inQuotes) {
                            res.push(current.trim());
                            current = '';
                        } else {
                            current += ch;
                        }
                    }
                    res.push(current.trim());
                    return res;
                };

                const headers = cleanSplit(lines[0]).map(h => h.toLowerCase().trim());
                const rows = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = cleanSplit(lines[i]);
                    const obj = {};
                    headers.forEach((h, idx) => {
                        obj[h] = (idx < cols.length) ? cols[idx] : '';
                    });
                    rows.push(obj);
                }
                return rows;
            }

            function fetchSheet(url) {
                return fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.text();
                    })
                    .then(csv => parseCSV(csv));
            }

            // ─── TYPE BADGE HELPER ──────────────────────────────────────────────────
            function getTypeBadge(type) {
                const t = String(type || '').toLowerCase();
                let cls = 'badge-type';
                if (t === 'hard') cls += ' hard';
                else if (t === 'soft') cls += ' soft';
                else if (t === 'to get') cls += ' toget';
                else if (t === 'to give') cls += ' togive';
                else cls += ' soft'; // fallback
                return `<span class="${cls}">${escapeHTML(type)}</span>`;
            }

            // ─── RENDER FUNCTIONS ────────────────────────────────────────────────────

            function renderUnion(data) {
                if (!data || data.length === 0) {
                    unionBody.innerHTML = `<tr><td colspan="8" class="empty-message">No union records found.</td></tr>`;
                    unionTotalCount.textContent = '0';
                    unionFilteredCount.textContent = '0';
                    unionCountBadge.textContent = '0';
                    return;
                }
                let html = '';
                data.forEach((row, i) => {
                    const billUrl = row.bill_url ? row.bill_url.trim() : '';
                    const billDisplay = billUrl ? 
                        `<a href="${escapeHTML(billUrl)}" target="_blank" style="color:#0b2b4a; text-decoration:underline;">View</a>` :
                        '-';
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td><code>${escapeHTML(row.transaction_id)}</code></td>
                        <td><strong>${escapeHTML(row.title)}</strong></td>
                        <td>${getTypeBadge(row.type)}</td>
                        <td style="max-width:120px; overflow:hidden; text-overflow:ellipsis;">${billDisplay}</td>
                        <td>${escapeHTML(row.amount)}</td>
                        <td>${escapeHTML(row.date)}</td>
                        <td>${escapeHTML(row.updated_at)}</td>
                    </tr>`;
                });
                unionBody.innerHTML = html;
                unionTotalCount.textContent = dataStore.union.length;
                unionFilteredCount.textContent = data.length;
                unionCountBadge.textContent = data.length === dataStore.union.length ?
                    `All ${data.length}` :
                    `${data.length} / ${dataStore.union.length}`;
            }

            function renderTransactions(data) {
                if (!data || data.length === 0) {
                    txBody.innerHTML = `<tr><td colspan="7" class="empty-message">No transactions found.</td></tr>`;
                    txTotalCount.textContent = '0';
                    return;
                }
                let html = '';
                data.forEach((row, i) => {
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td><code>${escapeHTML(row.transaction_id)}</code></td>
                        <td><span class="badge-mode">${escapeHTML(row.mode)}</span></td>
                        <td>${escapeHTML(row.amount)}</td>
                        <td>${escapeHTML(row.date)}</td>
                        <td>${escapeHTML(row.updated_at)}</td>
                        <td><span class="badge-dept">${escapeHTML(row.user)}</span></td>
                    </tr>`;
                });
                txBody.innerHTML = html;
                txTotalCount.textContent = data.length;
            }

            // ─── FILTER LOGIC ────────────────────────────────────────────────────────

            function applyUnionFilters() {
                const typeVal = unionTypeFilter.value.toLowerCase();
                const all = dataStore.union;

                let filtered = all.filter(row => {
                    const rowType = String(row.type || '').toLowerCase();
                    if (typeVal !== 'all' && rowType !== typeVal) return false;
                    return true;
                });

                filteredUnion = filtered;
                renderUnion(filtered);
            }

            // ─── LOAD ALL DATA ─────────────────────────────────────────────────────

            function loadAllData() {
                // load union
                fetchSheet(SHEETS.union.url)
                    .then(data => {
                        dataStore.union = data;
                        filteredUnion = [...data];
                        renderUnion(data);
                    })
                    .catch(err => {
                        console.error('Union load error:', err);
                        unionBody.innerHTML =
                            `<tr><td colspan="8" class="empty-message">⚠️ Failed to load union data.</td></tr>`;
                    });

                // load all user transaction sheets
                const userPromises = SHEETS.userSheets.map(sheet =>
                    fetchSheet(sheet.url)
                    .then(data => {
                        data.forEach(row => row.user = sheet.name);
                        return data;
                    })
                    .catch(err => {
                        console.error(`Error loading ${sheet.name}:`, err);
                        return [];
                    })
                );

                Promise.all(userPromises)
                    .then(results => {
                        const combined = results.flat();
                        dataStore.transactions = combined;
                        renderTransactions(combined);
                    })
                    .catch(err => {
                        console.error('Transactions load error:', err);
                        txBody.innerHTML =
                            `<tr><td colspan="7" class="empty-message">⚠️ Failed to load transactions.</td></tr>`;
                    });
            }

            // ─── NAVIGATION ──────────────────────────────────────────────────────────

            function switchTab(tabId) {
                navTabs.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === tabId);
                });
                tabContents.forEach(el => {
                    el.classList.toggle('active', el.id === tabId);
                });
            }

            navTabs.forEach(btn => {
                btn.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            // ─── DATE ─────────────────────────────────────────────────────────────────

            function setCurrentDate() {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = now.getFullYear();
                currentDateEl.textContent = `${d}-${m}-${y}`;
            }

            // ─── FILTER EVENTS ─────────────────────────────────────────────────────

            unionApplyFilterBtn.addEventListener('click', applyUnionFilters);
            unionResetFilterBtn.addEventListener('click', function() {
                unionTypeFilter.value = 'all';
                applyUnionFilters();
            });
            unionTypeFilter.addEventListener('change', applyUnionFilters);

                                <td style="padding:10px 10px; font-size:12.5px; text-align:left; color:#000;">${escapeHTML(row.updated_at)}</td>
                            </tr>`;
                    });

                                        <th style="padding:10px 10px; text-align:left; font-weight:bold; font-size:12px; color:#000; width:18%;">Title</th>
                                        <th style="padding:10px 10px; text-align:left; font-weight:bold; font-size:12px; color:#000; width:12%;">Type</th>
                                        <th style="padding:10px 10px; text-align:left; font-weight:bold; font-size:12px; color:#000; width:18%;">Bill URL</th>
                                        <th style="padding:10px 10px; text-align:left; font-weight:bold; font-size:12px; color:#000; width:12%;">Amount</th>
                                        <th style="padding:10px 10px; text-align:left; font-weight:bold; font-size:12px; color:#000; width:10%;">Date</th>
                                        <th style="padding:10px 10px; text-align:left; font-weight:bold; font-size:12px; color:#000; width:10%;">Updated</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${rowsHTML}

                            </table>

                                <div>Total: ${total} · Page ${page+1} of ${totalPages}</div>

                        </div>

                const zone = document.getElementById('pdf-render-zone');

                    margin: 0,
                    filename: `Union_Status_${dateStr}.pdf`,

                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },

                html2pdf().set(opt).from(zone).save()
                    .then(() => {
                        document.body.classList.remove('printing-mode');
                        zone.innerHTML = '';

                    .catch(err => {
                        console.error(err);
                        document.body.classList.remove('printing-mode');
                        zone.innerHTML = '';
                        alert('PDF generation failed.');

                                        <th style="padding:10px 10px; text-align:left; font-weight:bold; font-size:12px; color:#000; width:14%;">Amount</th>
                                        <th style="padding:10px 10px; text-align:left; font-weight:bold; font-size:12px; color:#000; width:16%;">Date</th>

            unionPrintBtn.addEventListener('click', generateUnionPDF);
            txPrintBtn.addEventListener('click', generateTransactionsPDF);

            // ─── BOOT ──────────────────────────────────────────────────────────────────

            setCurrentDate();
            loadAllData();

        })();
    </script>
